spring:
  application:
    name: sindico-app
  profiles:
    default: dev
  thymeleaf:
    cache: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  condominio:
    # Alinhado a migration V5 (condominio padrao do MVP)
    default-id: "00000000-0000-0000-0000-000000000001"
  # Origens permitidas CORS no /api/**; separadas por virgula.
  # Dev: Vite dev server. Prod: Vercel ou dominio customizado.
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  storage:
    upload-dir: uploads

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/sindico;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  hikari:
    maximum-pool-size: 5
    minimum-idle: 1
    connection-timeout: 20000
    idle-timeout: 300000

app:
  flyway:
    # Dev: se Flyway falhar em "validation" apos editar migracao ja aplicada no H2 arquivo, suba com
    # APP_FLYWAY_REPAIR=true uma vez (ou apague ./data/sindico*.db). Nunca em prod.
    repair-before-migrate: ${APP_FLYWAY_REPAIR:false}

---
spring:
  config:
    activate:
      on-profile: vps
  datasource:
    # Conecta ao PostgreSQL da VPS via SSH tunnel (localhost:5433 -> VPS:5433)
    # Antes de rodar: ./tunnel-vps.sh
    url: jdbc:postgresql://localhost:5433/sindico
    username: ${DB_USERNAME:sindico_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    # Baseline: apenas para banco ja existente antes do Flyway (nao use em instalacao limpa).
    baseline-on-migrate: true
    baseline-version: 3
  hikari:
    maximum-pool-size: 5
    minimum-idle: 1
    connection-timeout: 20000
    idle-timeout: 300000

---
spring:
  config:
    activate:
      on-profile: prod
  thymeleaf:
    cache: true
  datasource:
    # CVE-2025-49146: sslmode=verify-full previne ataques MITM via fallback de channel binding
    url: ${DB_URL:jdbc:postgresql://localhost:5433/sindico}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      data-source-properties:
        sslMode: verify-full

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:}
