spring:
  application:
    name: sindico-app
  profiles:
    default: dev
  thymeleaf:
    cache: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  storage:
    upload-dir: uploads
  security:
    default-user:
      username: ${APP_ADMIN_USERNAME:admin}
      password: ${APP_ADMIN_PASSWORD:admin123}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/sindico;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  hikari:
    maximum-pool-size: 5
    minimum-idle: 1
    connection-timeout: 20000
    idle-timeout: 300000

---
spring:
  config:
    activate:
      on-profile: vps
  datasource:
    # Conecta ao PostgreSQL da VPS via SSH tunnel (localhost:5433 -> VPS:5433)
    # Antes de rodar: ./tunnel-vps.sh
    url: jdbc:postgresql://localhost:5433/sindico
    username: ${DB_USERNAME:sindico_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    baseline-version: 3
  hikari:
    maximum-pool-size: 5
    minimum-idle: 1
    connection-timeout: 20000
    idle-timeout: 300000

---
spring:
  config:
    activate:
      on-profile: prod
  thymeleaf:
    cache: true
  datasource:
    # CVE-2025-49146: sslmode=verify-full previne ataques MITM via fallback de channel binding
    url: ${DB_URL:jdbc:postgresql://localhost:5433/sindico}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      data-source-properties:
        sslMode: verify-full
