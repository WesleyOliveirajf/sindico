spring:
  application:
    name: sindico-app
  profiles:
    default: supabase
  thymeleaf:
    cache: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": false
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
        http-only: true

app:
  condominio:
    # Alinhado a migration V5 (condominio padrao do MVP)
    default-id: "00000000-0000-0000-0000-000000000001"
  # Origens permitidas CORS no /api/**; separadas por virgula.
  # Dev: Vite dev server. Prod: Vercel ou dominio customizado.
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  storage:
    upload-dir: uploads
    max-file-size-bytes: ${APP_MAX_FILE_SIZE_BYTES:10485760}
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-this-secret-dev-only-change-this-secret}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:720}

---
spring:
  config:
    activate:
      on-profile: supabase
  thymeleaf:
    cache: false
  datasource:
    # Supabase: em Database > Connection string use "URI" da conexão direta (porta 5432).
    # Ex.: jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
    # Evite o pooler em transação (6543) para Flyway/Hibernate — use direct ou session pooler.
    url: ${DB_URL}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    # O schema do Supabase foi criado via MCP apply_migration (fora do Flyway da app).
    # Faz baseline em V10 para a app iniciar nesse banco e aplicar futuras V11+.
    baseline-on-migrate: true
    baseline-version: 10
  hikari:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 20000
    idle-timeout: 300000
    max-lifetime: 1200000

app:
  condominio:
    default-id: "00000000-0000-0000-0000-000000000001"
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173}
  storage:
    upload-dir: uploads
    max-file-size-bytes: ${APP_MAX_FILE_SIZE_BYTES:10485760}
  flyway:
    repair-before-migrate: ${APP_FLYWAY_REPAIR:false}
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-this-secret-dev-only-change-this-secret}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:720}

---
spring:
  config:
    activate:
      on-profile: prod
  thymeleaf:
    cache: true
  datasource:
    # CVE-2025-49146: sslmode=verify-full previne ataques MITM via fallback de channel binding
    url: ${DB_URL:jdbc:postgresql://localhost:5433/sindico}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      data-source-properties:
        sslMode: verify-full

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:}
  storage:
    upload-dir: uploads
    max-file-size-bytes: ${APP_MAX_FILE_SIZE_BYTES:10485760}
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-this-secret-dev-only-change-this-secret}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:720}
