<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindico App - Meu perfil</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8; --panel: #ffffff; --ink: #17212b; --muted: #5f6f80;
            --accent: #0f766e; --accent-soft: #c9f3eb; --border: #d8e0e8;
            --danger: #b42318; --danger-soft: #fee4e2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: var(--bg); color: var(--ink);
        }
        .page { max-width: 760px; margin: 0 auto; padding: 0 20px 48px; }
        nav {
            display: flex; align-items: center; gap: 20px;
            padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 32px;
        }
        nav a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
        nav .brand { font-weight: 700; font-size: 1.1rem; color: var(--accent); margin-right: auto; }
        h1 { margin: 0 0 28px; font-size: 1.6rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        .panel {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 14px; padding: 22px 20px;
        }
        .panel h2 { margin: 0 0 16px; font-size: 1.05rem; }
        label { display: block; margin-bottom: 3px; color: var(--muted); font-size: 0.87rem; }
        input {
            width: 100%; border: 1px solid var(--border); border-radius: 9px;
            padding: 9px 11px; font: inherit; margin-bottom: 12px;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .btn {
            border: 0; background: var(--accent); color: #fff;
            border-radius: 9px; padding: 10px 18px; font-weight: 700;
            font-size: 0.95rem; cursor: pointer; width: 100%;
        }
        .btn:hover { background: #0d6159; }
        .msg { margin-bottom: 12px; border-radius: 9px; padding: 9px 12px; font-size: 0.9rem; }
        .msg-ok  { background: #dcfae6; color: #166534; }
        .msg-err { background: var(--danger-soft); color: var(--danger); }
        .hint { font-size: 0.77rem; color: var(--muted); margin: -8px 0 12px; }
        .info-row { font-size: 0.88rem; color: var(--muted); margin-bottom: 6px; }
        .info-row strong { color: var(--ink); }
    </style>
</head>
<body>
<div class="page">
    <nav>
        <span class="brand">Sindico App</span>
        <a th:href="@{/}">&#8592; Dashboard</a>
        <a th:href="@{/logout}"
           onclick="return confirm('Deseja sair?')"
           th:onclick="|return confirm('Deseja sair?')|">Sair</a>
    </nav>

    <h1>Meu perfil</h1>

    <div th:if="${mensagem != null}" class="msg msg-ok" th:text="${mensagem}"></div>

    <div class="grid">

        <!-- Dados pessoais -->
        <div class="panel">
            <h2>Dados pessoais</h2>
            <div class="msg msg-err" th:if="${erroDados != null}" th:text="${erroDados}"></div>
            <p class="info-row">E-mail: <strong th:text="${usuario.email}"></strong></p>
            <form th:action="@{/perfil/dados}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="nome">Nome</label>
                <input id="nome" name="nome" type="text" th:value="${usuario.nome}" required maxlength="150">
                <label for="telefone">Telefone</label>
                <input id="telefone" name="telefone" type="tel" th:value="${usuario.telefone}" maxlength="30" placeholder="(11) 99999-0000">
                <button class="btn" type="submit">Salvar dados</button>
            </form>
        </div>

        <!-- Alterar senha -->
        <div class="panel">
            <h2>Alterar senha</h2>
            <div class="msg msg-err" th:if="${erroSenha != null}" th:text="${erroSenha}"></div>
            <form th:action="@{/perfil/senha}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="senhaAtual">Senha atual</label>
                <input id="senhaAtual" name="senhaAtual" type="password" autocomplete="current-password" required>
                <label for="novaSenha">Nova senha</label>
                <input id="novaSenha" name="novaSenha" type="password" autocomplete="new-password" required minlength="8">
                <p class="hint">Minimo 8 caracteres com letras e numeros.</p>
                <label for="confirmarSenha">Confirmar nova senha</label>
                <input id="confirmarSenha" name="confirmarSenha" type="password" autocomplete="new-password" required>
                <button class="btn" type="submit">Alterar senha</button>
            </form>
        </div>

    </div>
</div>
</body>
</html>
