<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveSindIA - Criar conta</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8;
            --panel: #ffffff;
            --ink: #17212b;
            --muted: #5f6f80;
            --accent: #0f766e;
            --accent-soft: #c9f3eb;
            --border: #d8e0e8;
            --danger: #b42318;
            --danger-soft: #fee4e2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #eef8ff 0%, var(--bg) 45%, #edf4ef 100%);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px 26px 32px;
            box-shadow: 0 16px 44px rgba(23, 33, 43, 0.09);
        }
        h1 { margin: 0 0 4px; font-size: 1.45rem; }
        .muted { margin: 0 0 20px; color: var(--muted); font-size: 0.92rem; }
        .section-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
            margin: 18px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        label { display: block; margin-bottom: 3px; color: var(--muted); font-size: 0.88rem; }
        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            margin-bottom: 12px;
            transition: border-color .15s;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .field-error { color: var(--danger); font-size: 0.82rem; margin: -8px 0 10px; }
        .btn {
            width: 100%;
            border: 0;
            background: var(--accent);
            color: #fff;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn:hover { background: #0d6159; }
        .msg {
            margin-bottom: 14px;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.92rem;
        }
        .msg-error { background: var(--danger-soft); color: var(--danger); }
        .link-row { text-align: center; margin-top: 18px; font-size: 0.9rem; color: var(--muted); }
        .link-row a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .hint { font-size: 0.78rem; color: var(--muted); margin: -8px 0 12px; }
    </style>
</head>
<body>
<div class="card">
    <h1>LiveSindIA</h1>
    <p class="muted">Crie sua conta gratuita e gerencie seu condominio.</p>

    <div class="msg msg-error" th:if="${erro != null}" th:text="${erro}"></div>

    <form th:action="@{/cadastro}" method="post" th:object="${form}" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="section-title">Seus dados</div>

        <label for="nome">Nome completo *</label>
        <input id="nome" type="text" th:field="*{nome}" autocomplete="name" required maxlength="150"
               th:classappend="${#fields.hasErrors('nome')} ? 'input-error'">
        <div class="field-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>

        <label for="email">E-mail *</label>
        <input id="email" type="email" th:field="*{email}" autocomplete="email" required maxlength="150"
               th:classappend="${#fields.hasErrors('email')} ? 'input-error'">
        <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

        <div class="section-title">Seu condominio</div>

        <label for="nomeCondominio">Nome do condominio *</label>
        <input id="nomeCondominio" type="text" th:field="*{nomeCondominio}" required maxlength="150"
               placeholder="Ex: Residencial das Flores"
               th:classappend="${#fields.hasErrors('nomeCondominio')} ? 'input-error'">
        <div class="field-error" th:if="${#fields.hasErrors('nomeCondominio')}" th:errors="*{nomeCondominio}"></div>

        <div class="section-title">Senha</div>

        <label for="senha">Senha *</label>
        <input id="senha" type="password" th:field="*{senha}" autocomplete="new-password" required minlength="8"
               th:classappend="${#fields.hasErrors('senha')} ? 'input-error'">
        <div class="field-error" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></div>
        <p class="hint">Minimo 8 caracteres com letras e numeros.</p>
        <label for="confirmarSenha">Confirmar senha *</label>
        <input id="confirmarSenha" type="password" th:field="*{confirmarSenha}" autocomplete="new-password" required
               th:classappend="${#fields.hasErrors('confirmarSenha')} ? 'input-error'">
        <div class="field-error" th:if="${#fields.hasErrors('confirmarSenha')}" th:errors="*{confirmarSenha}"></div>

        <div class="lgpd-container" style="margin-top: 15px; margin-bottom: 15px;">
            <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px;">
                <input id="aceitouTermos" type="checkbox" th:field="*{aceitouTermos}" required style="width: auto; margin-top: 4px; margin-bottom: 0;">
                <label for="aceitouTermos" style="display: inline; font-size: 0.85rem; cursor: pointer;">
                    Declaro que li e aceito os <a th:href="@{/termos}" target="_blank" style="color: var(--accent); font-weight: 600; text-decoration: none;">Termos de Uso</a> e a <a th:href="@{/privacidade}" target="_blank" style="color: var(--accent); font-weight: 600; text-decoration: none;">Política de Privacidade</a> da plataforma, e estou ciente de que meus dados pessoais serão tratados para criação da conta, autenticação, prestação dos serviços contratados, suporte, segurança da plataforma e cumprimento de obrigações legais.
                </label>
            </div>
            <div class="field-error" th:if="${#fields.hasErrors('aceitouTermos')}" th:errors="*{aceitouTermos}" style="margin-top: -6px; margin-bottom: 10px;"></div>

            <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 15px;">
                <input id="aceitouMarketing" type="checkbox" th:field="*{aceitouMarketing}" style="width: auto; margin-top: 4px; margin-bottom: 0;">
                <label for="aceitouMarketing" style="display: inline; font-size: 0.85rem; cursor: pointer;">
                    Aceito receber comunicações comerciais, novidades e ofertas da plataforma por e-mail, WhatsApp ou telefone. Posso cancelar esse recebimento a qualquer momento.
                </label>
            </div>
            
            <div style="font-size: 0.78rem; color: var(--muted); text-align: center; margin-bottom: 10px;">
                Consulte também a nossa <a th:href="@{/cookies}" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 600;">Política de Cookies</a>.
            </div>
        </div>

        <button class="btn" type="submit">Criar conta</button>
    </form>

    <div class="link-row">
        Ja tem conta? <a th:href="@{/login}">Entrar</a>
    </div>
</div>
</body>
</html>
