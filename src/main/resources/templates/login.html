<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindico App - Entrar</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8;
            --panel: #ffffff;
            --ink: #17212b;
            --muted: #5f6f80;
            --accent: #0f766e;
            --border: #d8e0e8;
            --danger: #b42318;
            --danger-soft: #fee4e2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #eef8ff 0%, var(--bg) 45%, #edf4ef 100%);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px 26px 32px;
            box-shadow: 0 16px 44px rgba(23, 33, 43, 0.09);
        }
        h1 {
            margin: 0 0 6px;
            font-size: 1.4rem;
        }
        .muted {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 0.92rem;
        }
        label {
            display: block;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 0.88rem;
        }
        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            margin-bottom: 14px;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            width: 100%;
            border: 0;
            background: var(--accent);
            color: #fff;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 6px;
        }
        .btn:hover {
            background: #0d6159;
        }
        .msg {
            margin-bottom: 14px;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.92rem;
        }
        .msg-error {
            background: var(--danger-soft);
            color: var(--danger);
        }
        .msg-ok {
            background: #dcfae6;
            color: #166534;
        }
        .field-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 4px;
        }
        .field-head label {
            margin-bottom: 0;
        }
        .field-head a,
        .link-row a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .field-head a {
            font-size: 0.84rem;
            white-space: nowrap;
        }
        .link-row {
            text-align: center;
            margin-top: 18px;
            font-size: 0.9rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Sindico App</h1>
    <p class="muted">Informe e-mail e senha para acessar o painel do condominio.</p>

    <div class="msg msg-error" th:if="${param.error != null}">
        E-mail ou senha incorretos.
    </div>
    <div class="msg msg-ok" th:if="${param.logout != null}">
        Voce saiu com sucesso.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="username">E-mail</label>
        <input id="username" name="username" type="email" autocomplete="username" required autofocus>
        <div class="field-head">
            <label for="password">Senha</label>
            <a th:href="@{/esqueci-senha}">Esqueci minha senha</a>
        </div>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="btn" type="submit">Entrar</button>
    </form>
    <div class="link-row">
        Nao tem conta? <a th:href="@{/cadastro}">Criar conta gratuita</a>
    </div>
</div>
</body>
</html>
