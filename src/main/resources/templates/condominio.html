<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>Sindico App - Condominio</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8;
            --panel: #ffffff;
            --ink: #17212b;
            --muted: #5f6f80;
            --accent: #0f766e;
            --accent-soft: #c9f3eb;
            --border: #d8e0e8;
            --danger: #b42318;
            --danger-soft: #fee4e2;
            --ok-soft: #dcfae6;
            --ok-ink: #166534;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #eef8ff 0%, var(--bg) 45%, #edf4ef 100%);
            color: var(--ink);
        }

        .page {
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .hero {
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            background: linear-gradient(120deg, rgba(15, 118, 110, 0.16), rgba(255, 255, 255, 0.95));
            box-shadow: 0 20px 50px rgba(23, 33, 43, 0.08);
        }

        .badge {
            display: inline-block;
            margin-bottom: 14px;
            padding: 8px 14px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-soft), #f0fffb);
            color: var(--accent);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: var(--muted);
        }

        .card {
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            font: inherit;
            color: var(--ink);
            background: #fff;
        }

        textarea {
            min-height: 96px;
            resize: vertical;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .btn, .link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 700;
            text-decoration: none;
        }

        .btn {
            border: 0;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
        }

        .link-btn {
            border: 1px solid rgba(15, 118, 110, 0.35);
            background: rgba(201, 243, 235, 0.75);
            color: var(--accent);
        }

        .message {
            margin-bottom: 14px;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        .message-ok {
            background: var(--ok-soft);
            color: var(--ok-ink);
        }

        .message-error {
            background: var(--danger-soft);
            color: var(--danger);
        }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <div class="badge">Cadastro base</div>
        <h1>Condominio</h1>
        <p>Mantenha os dados principais do condominio usados nos registros do piloto.</p>
    </section>

    <section class="card">
        <div class="message message-ok" th:if="${mensagem}" th:text="${mensagem}"></div>
        <div class="message message-error" th:if="${#fields.hasErrors('*')}" th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>

        <form th:action="@{/condominio}" th:object="${form}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-grid">
                <div>
                    <label for="nome">Nome</label>
                    <input id="nome" type="text" th:field="*{nome}" required maxlength="150" autocomplete="organization">
                </div>

                <div>
                    <label for="cnpj">CNPJ</label>
                    <input id="cnpj" type="text" th:field="*{cnpj}" maxlength="18" placeholder="00.000.000/0000-00">
                </div>

                <div>
                    <label for="endereco">Endereco</label>
                    <textarea id="endereco" th:field="*{endereco}" maxlength="500"></textarea>
                </div>

                <div class="actions">
                    <button class="btn" type="submit">Salvar condominio</button>
                    <a class="link-btn" th:href="@{/}">Voltar ao dashboard</a>
                </div>
            </div>
        </form>
    </section>
</main>
</body>
</html>
