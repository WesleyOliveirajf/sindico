<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveSindIA - Esqueci minha senha</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8; --panel: #ffffff; --ink: #17212b; --muted: #5f6f80;
            --accent: #0f766e; --border: #d8e0e8; --danger: #b42318; --danger-soft: #fee4e2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #eef8ff 0%, var(--bg) 45%, #edf4ef 100%);
            color: var(--ink); display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .card {
            width: 100%; max-width: 420px; background: var(--panel);
            border: 1px solid var(--border); border-radius: 18px;
            padding: 28px 26px 32px; box-shadow: 0 16px 44px rgba(23,33,43,.09);
        }
        h1 { margin: 0 0 6px; font-size: 1.4rem; }
        .muted { margin: 0 0 20px; color: var(--muted); font-size: 0.92rem; }
        label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 0.88rem; }
        input {
            width: 100%; border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 12px; font: inherit; margin-bottom: 14px;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .btn {
            width: 100%; border: 0; background: var(--accent); color: #fff;
            border-radius: 10px; padding: 12px 16px; font-weight: 700; font-size: 1rem; cursor: pointer;
        }
        .btn:hover { background: #0d6159; }
        .msg { margin-bottom: 14px; border-radius: 10px; padding: 10px 12px; font-size: 0.92rem; }
        .msg-ok { background: #dcfae6; color: #166534; }
        .link-row { text-align: center; margin-top: 18px; font-size: 0.9rem; color: var(--muted); }
        .link-row a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <h1>Esqueci minha senha</h1>
    <p class="muted">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>

    <div class="msg msg-ok" th:if="${mensagem != null}" th:text="${mensagem}"></div>

    <form th:action="@{/esqueci-senha}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" required autofocus>
        <button class="btn" type="submit">Enviar link de redefinicao</button>
    </form>

    <div class="link-row">
        <a th:href="@{/login}">Voltar ao login</a>
    </div>
</div>
</body>
</html>
